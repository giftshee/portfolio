{% extends "myapp/base.html" %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container py-4">
    <h2>{{ title }}</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Display current image if editing -->
        <div class="mb-3">
            <label>Current Profile Image:</label><br>
            <img id="imagePreview" 
                 src="{% if form.instance.image %}{{ form.instance.image.url }}{% else %}{% static 'assets/img/profile-img.jpg' %}{% endif %}" 
                 alt="Profile" style="max-width: 200px; max-height: 200px; display:block;">
        </div>

        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'about' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<!-- JavaScript to show live preview of uploaded image -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const imageInput = document.querySelector('input[type="file"][name="image"]');
    const imagePreview = document.getElementById('imagePreview');

    if (imageInput) {
        imageInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    }
});
</script>
{% endblock %}
