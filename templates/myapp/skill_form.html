{% extends "myapp/base.html" %}

{% block title %}Skill Form{% endblock %}

{% block content %}
<div class="container py-5">
    <h2>{% if form.instance.pk %}Edit Skill{% else %}Add Skill{% endif %}</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">{% if form.instance.pk %}Update{% else %}Add{% endif %}</button>
    </form>
</div>
{% endblock %}
