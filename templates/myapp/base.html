  <!-- Mobile nav toggle script -->
  <script>
    const mobileNavToggle = document.querySelector('.mobile-nav-toggle');
    const navmenu = document.querySelector('.navmenu');

    mobileNavToggle?.addEventListener('click', function () {
      navmenu?.classList.toggle('mobile-nav-active');
      this.classList.toggle('bi-list');
      this.classList.toggle('bi-x');
    });

    // Close mobile menu on link click
    document.querySelectorAll('.navmenu a').forEach(link => {
      link.addEventListener('click', () => {
        if (navmenu.classList.contains('mobile-nav-active')) {
          navmenu.classList.remove('mobile-nav-active');
          mobileNavToggle.classList.add('bi-list');
          mobileNavToggle.classList.remove('bi-x');
        }
      });
    });

body {
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  background-color: #f8f9fa;
  color: #333;
  line-height: 1.6;
}



/* ================= HEADINGS ================= */

h1, h2, h3, h4 {
  font-weight: 700;
  letter-spacing: -0.5px;
}



/* ================= HERO IMPROVEMENTS ================= */

.hero {
  position: relative;
  background-size: cover;
  background-position: center;
  min-height: 90vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
}



.hero-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}



.hero-content {
  position: relative;
  z-index: 2;
  max-width: 800px;
  padding: 20px;
}



.hero h1 {
  font-size: 3rem;
}



.hero h3 {
  font-weight: 400;
  margin-top: 10px;
}



/* CTA buttons */
.hero .btn {
  padding: 12px 25px;
  border-radius: 30px;
  font-weight: 600;
  transition: 0.3s;
}



.hero .btn:hover {
  transform: translateY(-3px);
}



/* ================= SECTION TITLES ================= */

.section-title {
  text-align: center;
  margin-bottom: 50px;
}



.section-title h2 {
  font-size: 2.2rem;
  margin-bottom: 10px;
}



.section-title p {
  color: #6c757d;
}



/* ================= CARDS (SERVICES / PORTFOLIO) ================= */

.service-item,
.portfolio-card,
.stats-item {
  background: white;
  border-radius: 15px;
  padding: 30px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  transition: all 0.3s ease;
}



.service-item:hover,
.portfolio-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 35px rgba(0,0,0,0.12);
}



/* icons */
.service-item i {
  font-size: 40px;
  color: #0d6efd;
  margin-bottom: 15px;
}



/* ================= BUTTONS ================= */

.btn {
  border-radius: 25px;
  font-weight: 500;
  transition: 0.3s;
}



.btn:hover {
  transform: scale(1.05);
}



/* primary buttons */
.btn-primary {
  background-color: #0d6efd;
  border: none;
}



/* success button */
.btn-success {
  background-color: #198754;
  border: none;
}



/* danger button */
.btn-danger {
  background-color: #dc3545;
  border: none;
}



/* ================= SKILLS BAR ================= */

.progress {
  height: 10px;
  border-radius: 20px;
  background: #e9ecef;
}



.progress-bar {
  background: linear-gradient(90deg, #0d6efd, #6610f2);
  border-radius: 20px;
}



/* ================= STATS ================= */

.stats-item {
  text-align: center;
}



.stats-item i {
  font-size: 30px;
  color: #0d6efd;
  margin-bottom: 10px;
}



/* ================= PORTFOLIO ================= */

.portfolio-card img {
  border-radius: 12px;
  margin-bottom: 15px;
}



/* ================= CONTACT BOX ================= */

.contact-box {
  background: #fff;
  border-radius: 15px;
  padding: 30px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}



.contact .form-control {
  border-radius: 10px;
  padding: 12px;
}



/* ================= TESTIMONIALS ================= */

.testimonial-item {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
}



.testimonial-img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  object-fit: cover;
}

  padding: 80px 0;
